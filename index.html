<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus.World | Premium Reading Tools</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Playfair+Display:ital,wght@0,400;1,700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0a0a0a; 
            --card-bg: #141414; 
            --text: #e0e0e0; 
            --gold: #C5A059; 
            --gold-dim: #8c703d;
            --accent: #1f1f1f;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Lato', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 10px; }

        /* Header Styling */
        header { 
            background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(10px);
            padding: 1.5rem 5%; 
            display: flex; justify-content: center; 
            border-bottom: 1px solid var(--gold-dim); 
            position: fixed; top: 0; width: 100%; z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        header.hide { transform: translateY(-100%); }

        .logo { 
            font-family: 'Cinzel', serif; font-size: 2rem; 
            color: var(--gold); letter-spacing: 6px; 
            cursor: pointer; user-select: none;
            text-shadow: 0 0 15px rgba(197, 160, 89, 0.3);
        }

        .container { max-width: 1200px; margin: 9rem auto 4rem auto; padding: 0 25px; }
        
        /* Search Bar Section */
        .search-container { 
            text-align: center; margin-bottom: 4rem; position: relative; max-width: 600px; margin-left: auto; margin-right: auto;
        }
        #search-input {
            width: 100%; padding: 15px 25px; background: var(--accent); 
            border: 1px solid var(--gold-dim); color: #fff; font-family: 'Lato';
            border-radius: 30px; outline: none; transition: 0.4s;
            font-size: 1rem;
        }
        #search-input:focus { border-color: var(--gold); box-shadow: 0 0 20px rgba(197, 160, 89, 0.15); width: 105%; }

        /* Product Grid */
        .view { display: none; }
        .active-view { display: block; animation: fadeIn 1s ease; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2.5rem; }
        
        .prod-card { 
            background: var(--card-bg); border: 1px solid #252525; padding: 20px; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            display: flex; flex-direction: column;
            position: relative; overflow: hidden;
        }
        .prod-card:hover { 
            border-color: var(--gold); 
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .prod-img { 
            width: 100%; height: 250px; object-fit: cover; 
            border-bottom: 1px solid #252525; margin-bottom: 20px;
            transition: 0.5s;
        }
        .prod-card:hover .prod-img { transform: scale(1.05); }

        .prod-title { 
            font-family: 'Playfair Display'; font-size: 1.4rem;
            color: var(--gold); margin-bottom: 12px; font-weight: 700;
        }
        
        .prod-desc {
            font-size: 0.9rem; color: #b0b0b0; flex-grow: 1;
            margin-bottom: 20px; line-height: 1.5;
        }

        /* Action Area */
        .price-tag { margin-top: auto; padding-top: 20px; border-top: 1px solid #252525; }
        .price-disclaimer { color: #555; font-size: 0.75rem; display: block; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        
        .btn-buy { 
            display: block; padding: 12px; border: 1px solid var(--gold);
            color: var(--gold); text-decoration: none; text-align: center; 
            font-family: 'Cinzel'; font-size: 0.85rem; font-weight: bold;
            transition: 0.3s; position: relative; z-index: 1;
        }
        .btn-buy:hover { background: var(--gold); color: #000; letter-spacing: 2px; }

        /* Admin Layout */
        #view-admin { 
            background: var(--card-bg); padding: 40px; 
            border: 1px solid var(--gold); border-radius: 10px;
        }
        .admin-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 30px; }
        input, textarea { 
            width: 100%; padding: 12px; margin: 10px 0; 
            background: #050505; border: 1px solid #333; color: #fff; 
            border-radius: 5px; font-family: 'Lato';
        }
        input:focus { border-color: var(--gold); outline: none; }
        
        #json-output { 
            background: #000; color: #00ff41; width: 100%; height: 250px; 
            font-family: 'Courier New', monospace; padding: 15px; font-size: 0.85rem;
            border: 1px solid #222;
        }
        
        .admin-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; background: #0a0a0a; border: 1px solid #222; margin-bottom: 8px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .admin-grid { grid-template-columns: 1fr; }
            .logo { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<header id="main-header">
    <div class="logo" id="admin-trigger">FOCUS.WORLD</div>
</header>

<div class="container">
    <section id="view-shop" class="view active-view">
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search for tools that elevate your focus..." onkeyup="filterProducts()">
        </div>
        <div id="product-list" class="grid">
            </div>
    </section>

    <section id="view-admin" class="view">
        <h2 style="color:var(--gold); margin-bottom:30px; font-family:'Cinzel';">Vault Inventory Management</h2>
        <div class="admin-grid">
            <div style="background:var(--accent); padding:25px; border-radius:8px;">
                <h4 style="margin-bottom:15px; color:var(--gold-dim);">Add New Artifact</h4>
                <input type="text" id="p-name" placeholder="Product Name">
                <input type="text" id="p-img" placeholder="Image URL (Direct Link)">
                <input type="text" id="p-link" placeholder="Amazon Affiliate Link">
                <textarea id="p-desc" placeholder="Briefly describe the tool's power..." rows="4"></textarea>
                <button class="btn-buy" style="width:100%; margin-top:10px; cursor:pointer;" onclick="admin_addProduct()">GENERATE JSON DATA</button>
                <button class="btn-buy" style="width:100%; margin-top:10px; border-color:#444; color:#666; cursor:pointer;" onclick="window.location.reload()">CLOSE VAULT</button>
            </div>
            <div>
                <h4 style="margin-bottom:15px; color:var(--gold-dim);">Live JSON Output</h4>
                <textarea id="json-output" readonly placeholder="Your JSON will appear here..."></textarea>
                <div id="admin-list" style="margin-top:25px; max-height: 300px; overflow-y: auto;"></div>
            </div>
        </div>
    </section>
</div>

<script>
    let allProducts = [];
    const ADMIN_PASS = "canon_-!LB2107";
    let clicks = 0;

    // 1. Header Logic: Smooth Hide on Scroll
    let lastScroll = 0;
    const header = document.getElementById("main-header");

    window.addEventListener("scroll", () => {
        const currentScroll = window.pageYOffset;
        if (currentScroll <= 100) {
            header.classList.remove("hide");
            return;
        }
        if (currentScroll > lastScroll && !header.classList.contains("hide")) {
            header.classList.add("hide");
        } else if (currentScroll < lastScroll && header.classList.contains("hide")) {
            header.classList.remove("hide");
        }
        lastScroll = currentScroll;
    });

    // 2. Data Handling
    async function loadData() {
        try {
            const res = await fetch('affiliate.json');
            if(res.ok) {
                allProducts = await res.json();
                renderShop(allProducts);
            }
        } catch(e) { 
            console.error("The vault is empty or JSON is missing.");
        }
    }

    function renderShop(data) {
        const list = document.getElementById('product-list');
        if (data.length === 0) {
            list.innerHTML = `<p style="text-align:center; grid-column: 1/-1; color:var(--gold-dim);">No artifacts found in this collection.</p>`;
            return;
        }
        list.innerHTML = data.map(p => `
            <div class="prod-card">
                <img src="${p.img}" class="prod-img" onerror="this.src='https://via.placeholder.com/300x250/1a1a1a/C5A059?text=Focus.World'">
                <h3 class="prod-title">${p.name}</h3>
                <p class="prod-desc">${p.desc}</p>
                <div class="price-tag">
                    <span class="price-disclaimer">*Live Price on Amazon</span>
                    <a href="${p.link}" target="_blank" class="btn-buy">CHECK CURRENT PRICE</a>
                </div>
            </div>
        `).join('');
    }

    // 3. Search Logic
    function filterProducts() {
        const term = document.getElementById('search-input').value.toLowerCase();
        const filtered = allProducts.filter(p => 
            p.name.toLowerCase().includes(term) || 
            p.desc.toLowerCase().includes(term)
        );
        renderShop(filtered);
    }

    // 4. Admin Management
    document.getElementById('admin-trigger').addEventListener('click', () => {
        clicks++;
        setTimeout(() => clicks = 0, 1000);
        if(clicks === 3) {
            let pass = prompt("Access Key Required:");
            if(pass === ADMIN_PASS) {
                document.getElementById('view-shop').style.display = 'none';
                document.getElementById('view-admin').classList.add('active-view');
                renderAdmin();
            }
        }
    });

    function admin_addProduct() {
        const name = document.getElementById('p-name').value;
        const img = document.getElementById('p-img').value;
        const link = document.getElementById('p-link').value;
        const desc = document.getElementById('p-desc').value;

        if(!name || !link) { alert("Artifact name and Link are essential!"); return; }

        const p = { id: Date.now(), name, img, link, desc };
        allProducts.unshift(p);
        updateAdminView();
        
        // Clear Inputs
        document.getElementById('p-name').value = "";
        document.getElementById('p-img').value = "";
        document.getElementById('p-link').value = "";
        document.getElementById('p-desc').value = "";
    }

    function updateAdminView() {
        document.getElementById('json-output').value = JSON.stringify(allProducts, null, 4);
        renderAdmin();
    }

    function renderAdmin() {
        document.getElementById('admin-list').innerHTML = allProducts.map(p => `
            <div class="admin-item">
                <span style="font-size:0.9rem;">${p.name}</span>
                <button onclick="deleteProd(${p.id})" style="color:#ff4444; background:none; border:1px solid #444; padding:2px 8px; cursor:pointer; border-radius:3px;">Remove</button>
            </div>
        `).join('');
    }

    function deleteProd(id) {
        if(confirm("Delete this artifact?")) {
            allProducts = allProducts.filter(x => x.id !== id);
            updateAdminView();
        }
    }

    loadData();
</script>
</body>
</html>
