<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus.World | Affiliate Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Playfair+Display:ital,wght@0,400;1,700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #FDFBF7; --ink: #2C241B; --gold: #C5A059; --leather: #8B5E3C;
            --success: #28a745; --danger: #dc3545;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--paper); color: var(--ink); font-family: 'Lato', sans-serif; }
        
        header { background: white; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--leather); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Cinzel', serif; font-size: 1.6rem; cursor: pointer; }
        .nav-links button { background: none; border: 1px solid var(--ink); padding: 5px 15px; cursor: pointer; margin-left: 5px; font-weight: bold; }
        
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 20px; }
        .view { display: none; }
        .active-view { display: block; }

        table { width: 100%; border-collapse: collapse; background: white; margin-top: 1rem; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: var(--ink); color: white; }

        .form-card { max-width: 500px; margin: auto; padding: 2rem; background: white; border: 1px solid #ddd; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        .btn-block { width: 100%; padding: 15px; background: var(--ink); color: white; border: none; cursor: pointer; font-size: 1rem; font-weight: bold; }
        .btn-block:hover { background: var(--leather); }

        #json-output { background: #222; color: #0f0; padding: 15px; width: 100%; height: 150px; font-family: monospace; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="navigateTo('shop')">Focus.World</div>
    <div class="nav-links">
        <button onclick="navigateTo('shop')">Shop</button>
        <button onclick="navigateTo('admin')" style="background:var(--leather); color:white">Admin (JSON Gen)</button>
    </div>
</header>

<div class="container">
    
    <section id="view-shop" class="view">
        <h1 style="text-align:center; font-family:'Playfair Display'; margin-bottom:2rem;">The Affiliate Collection</h1>
        <div id="product-list" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:2rem;"></div>
    </section>

    <section id="view-checkout" class="view">
        <h2 style="margin-bottom:1rem">Complete Your Purchase</h2>
        <div style="display:grid; grid-template-columns: 1fr 400px; gap:2rem;">
            <div>
                <div class="form-card" style="max-width:100%; margin:0;">
                    <h3>Shipping Details</h3>
                    <input type="text" id="cust-name" placeholder="Your Full Name">
                    <input type="email" id="cust-email" placeholder="Email Address">
                    <input type="text" id="ship-address" placeholder="Full Street Address">
                    <button class="btn-block" onclick="completePurchase()" style="background:#6772e5">Confirm Order</button>
                </div>
            </div>
            <div style="background:#eee; padding:20px;">
                <h3>Item Summary</h3>
                <div id="checkout-items"></div>
                <hr style="margin:10px 0">
                <h3>Total: $<span id="checkout-total">0.00</span></h3>
            </div>
        </div>
    </section>

    <section id="view-admin" class="view">
        <h1 style="border-bottom:3px solid var(--leather)">Affiliate Content Manager</h1>
        
        <div style="display:grid; grid-template-columns: 400px 1fr; gap:2rem; margin-top:2rem;">
            <aside>
                <div class="form-card" style="width:100%; padding:15px;">
                    <h3>Add New Product</h3>
                    <input type="text" id="p-name" placeholder="Product Name">
                    <input type="number" id="p-price" placeholder="Price ($)">
                    <input type="text" id="p-img" placeholder="Image URL">
                    <textarea id="p-desc" placeholder="Product Description (The Problem it Solves)" rows="4"></textarea>
                    <button class="btn-block" onclick="admin_addProduct()">Generate JSON Code</button>
                </div>
            </aside>

            <main>
                <h3>Export to affiliate.json</h3>
                <p><small>Copy this code and paste it into your affiliate.json file:</small></p>
                <textarea id="json-output" readonly></textarea>
                
                <h3 style="margin-top:2rem">Current Preview</h3>
                <table id="admin-inventory">
                    <thead><tr><th>Name</th><th>Price</th><th>Description</th><th>Action</th></tr></thead>
                    <tbody></tbody>
                </table>
            </main>
        </div>
    </section>
</div>

<script>
    // --- APP STATE ---
    let products = JSON.parse(localStorage.getItem('fw_prods')) || [];
    let cart = [];

    // --- NAVIGATION ---
    function navigateTo(view) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
        document.getElementById('view-' + view).classList.add('active-view');
        renderAll();
    }

    // --- SHOP LOGIC ---
    function buyNow(id) {
        const p = products.find(x => x.id === id);
        cart = [p]; // One item checkout
        navigateTo('checkout');
    }

    function completePurchase() {
        const name = document.getElementById('cust-name').value;
        if(!name) return alert("Please enter your name");
        alert("Thank you " + name + "! Redirecting to payment...");
        cart = [];
        navigateTo('shop');
    }

    // --- ADMIN / JSON LOGIC ---
    function admin_addProduct() {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        const img = document.getElementById('p-img').value;
        const desc = document.getElementById('p-desc').value;

        if(!name || !price) return alert("Fill required fields");

        const newProd = {
            id: Date.now(),
            name: name,
            price: price,
            img: img,
            desc: desc
        };

        products.push(newProd);
        localStorage.setItem('fw_prods', JSON.stringify(products));
        
        // Update JSON Textarea
        document.getElementById('json-output').value = JSON.stringify(products, null, 4);
        
        // Clear inputs
        document.getElementById('p-name').value = '';
        document.getElementById('p-price').value = '';
        document.getElementById('p-img').value = '';
        document.getElementById('p-desc').value = '';

        renderAll();
    }

    function deleteProduct(id) {
        products = products.filter(p => p.id !== id);
        localStorage.setItem('fw_prods', JSON.stringify(products));
        document.getElementById('json-output').value = JSON.stringify(products, null, 4);
        renderAll();
    }

    // --- RENDER ENGINE ---
    function renderAll() {
        // Shop
        const shop = document.getElementById('product-list');
        shop.innerHTML = products.map(p => `
            <div style="background:white; padding:15px; border:1px solid #ddd; display:flex; flex-direction:column;">
                <img src="${p.img || 'https://via.placeholder.com/300'}" style="width:100%; height:200px; object-fit:cover">
                <h3 style="margin:10px 0; font-family:'Playfair Display'">${p.name}</h3>
                <p style="font-size:0.9rem; color:#666; flex-grow:1; margin-bottom:10px">${p.desc || 'No description available.'}</p>
                <p style="color:var(--leather); font-weight:bold; font-size:1.2rem; margin-bottom:10px">$${p.price}</p>
                <button class="btn-block" onclick="buyNow(${p.id})">Buy Now</button>
            </div>
        `).join('');

        // Checkout
        document.getElementById('checkout-items').innerHTML = cart.map(i => `<p><strong>${i.name}</strong> - $${i.price}</p>`).join('');
        document.getElementById('checkout-total').innerText = cart.reduce((a, b) => a + Number(b.price), 0).toFixed(2);

        // Admin Table
        const inv = document.querySelector('#admin-inventory tbody');
        inv.innerHTML = products.map(p => `
            <tr>
                <td>${p.name}</td>
                <td>$${p.price}</td>
                <td style="font-size:0.8rem">${p.desc ? p.desc.substring(0,30)+'...' : ''}</td>
                <td><button onclick="deleteProduct(${p.id})" style="color:red; border:none; background:none; cursor:pointer">Delete</button></td>
            </tr>
        `).join('');
    }

    // Start
    navigateTo('shop');
    // Set initial JSON if data exists
    if(products.length > 0) document.getElementById('json-output').value = JSON.stringify(products, null, 4);
</script>

</body>
</html>
