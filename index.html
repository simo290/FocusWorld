<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus.World | Reading Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Playfair+Display:ital,wght@0,400;1,700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #FDFBF7; --ink: #2C241B; --gold: #C5A059; --leather: #8B5E3C;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--paper); color: var(--ink); font-family: 'Lato', sans-serif; transition: 0.3s; }
        
        header { background: white; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--leather); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Cinzel', serif; font-size: 1.6rem; cursor: pointer; user-select: none; }
        .nav-links button { background: none; border: 1px solid var(--ink); padding: 5px 15px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .nav-links button:hover { background: var(--ink); color: white; }

        .container { max-width: 1200px; margin: 2rem auto; padding: 0 20px; }
        .view { display: none; }
        .active-view { display: block; animation: fadeIn 0.5s; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Admin Panel - Glassmorphism (Transparent) */
        #view-admin { 
            background: rgba(255, 255, 255, 0.4); 
            backdrop-filter: blur(15px); 
            border: 2px dashed var(--leather); 
            padding: 30px; 
            border-radius: 20px; 
        }

        .form-card { max-width: 500px; margin: auto; padding: 2rem; background: white; border: 1px solid #ddd; border-radius: 8px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; }
        .btn-block { width: 100%; padding: 15px; background: var(--ink); color: white; border: none; cursor: pointer; font-size: 1rem; font-weight: bold; border-radius: 4px; }
        .btn-block:hover { background: var(--leather); }

        #json-output { background: #1a1a1a; color: #00ff00; padding: 15px; width: 100%; height: 150px; font-family: monospace; margin-top: 10px; border-radius: 8px; border: none; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: var(--ink); color: white; }

        .prod-card { background: white; padding: 15px; border: 1px solid #ddd; display: flex; flex-direction: column; transition: transform 0.3s; }
        .prod-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="secretAccess()">Focus.World</div>
    <div class="nav-links">
        <button onclick="navigateTo('shop')">Shop Collection</button>
    </div>
</header>

<div class="container">
    
    <section id="view-shop" class="view">
        <h1 style="text-align:center; font-family:'Playfair Display'; margin-bottom:2rem; font-size: 2.5rem;">Curated Reading Essentials</h1>
        <div id="product-list" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:2rem;"></div>
    </section>

    <section id="view-checkout" class="view">
        <h2 style="margin-bottom:1.5rem; font-family:'Playfair Display'">Secure Checkout</h2>
        <div style="display:grid; grid-template-columns: 1fr 400px; gap:2rem;">
            <div>
                <div class="form-card" style="max-width:100%; margin:0;">
                    <h3>Shipping Information</h3>
                    <input type="text" id="cust-name" placeholder="Full Name">
                    <input type="email" id="cust-email" placeholder="Email Address">
                    <input type="text" id="ship-address" placeholder="Shipping Address">
                    <button class="btn-block" onclick="completePurchase()">Complete Order</button>
                </div>
            </div>
            <div style="background:rgba(0,0,0,0.03); padding:25px; border-radius:8px;">
                <h3>Order Summary</h3>
                <div id="checkout-items" style="margin-top:15px"></div>
                <hr style="margin:15px 0; border: 0; border-top: 1px solid #ccc;">
                <h3 style="color:var(--leather)">Total: $<span id="checkout-total">0.00</span></h3>
            </div>
        </div>
    </section>

    <section id="view-admin" class="view">
        <h1 style="border-bottom:3px solid var(--leather); padding-bottom:10px; font-family:'Cinzel'">Affiliate Manager (Secret)</h1>
        
        <div style="display:grid; grid-template-columns: 350px 1fr; gap:2rem; margin-top:2rem;">
            <aside>
                <div class="form-card" style="width:100%; padding:20px;">
                    <h3 style="margin-bottom:10px">New Product</h3>
                    <input type="text" id="p-name" placeholder="Product Name">
                    <input type="number" id="p-price" placeholder="Price ($)">
                    <input type="text" id="p-img" placeholder="Image URL">
                    <textarea id="p-desc" placeholder="Product Description / Solution" rows="4"></textarea>
                    <button class="btn-block" onclick="admin_addProduct()">Generate JSON Code</button>
                    <button class="btn-block" onclick="navigateTo('shop')" style="background:#666; margin-top:10px;">Back to Shop</button>
                </div>
            </aside>

            <main>
                <h3>Export to affiliate.json</h3>
                <textarea id="json-output" readonly placeholder="JSON code will appear here..."></textarea>
                
                <h3 style="margin-top:2rem">Inventory Preview</h3>
                <table id="admin-inventory">
                    <thead><tr><th>Name</th><th>Price</th><th>Action</th></tr></thead>
                    <tbody></tbody>
                </table>
            </main>
        </div>
    </section>
</div>

<script>
    // --- DATABASE & SECURITY ---
    let products = JSON.parse(localStorage.getItem('fw_prods')) || [];
    let cart = [];
    let clickCount = 0;
    const ADMIN_PASS = "CANON_-!lb2107"; // بدلها بالكود اللي بغيتي

    // --- SECRET ACCESS LOGIC ---
    function secretAccess() {
        clickCount++;
        // Reset timer: if no clicks for 2 seconds, reset count
        setTimeout(() => { clickCount = 0; }, 2000);

        if (clickCount === 3) {
            let pass = prompt("🔒 Restricted Area. Enter Password:");
            if (pass === ADMIN_PASS) {
                navigateTo('admin');
            } else if (pass !== null) {
                alert("Access Denied.");
            }
            clickCount = 0;
        } else {
            // Normal logo click takes you home
            navigateTo('shop');
        }
    }

    // --- NAVIGATION ---
    function navigateTo(view) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
        document.getElementById('view-' + view).classList.add('active-view');
        window.scrollTo(0,0);
        renderAll();
    }

    // --- SHOP & CHECKOUT ---
    function buyNow(id) {
        const p = products.find(x => x.id === id);
        cart = [p]; 
        navigateTo('checkout');
    }

    function completePurchase() {
        const name = document.getElementById('cust-name').value;
        if(!name) return alert("Please fill your details.");
        alert("Order received, " + name + "! We will contact you soon.");
        cart = [];
        navigateTo('shop');
    }

    // --- ADMIN / JSON GENERATOR ---
    function admin_addProduct() {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        const img = document.getElementById('p-img').value;
        const desc = document.getElementById('p-desc').value;

        if(!name || !price) return alert("Name and Price are required!");

        const newProd = {
            id: Date.now(),
            name,
            price,
            img: img || 'https://via.placeholder.com/300x200?text=No+Image',
            desc
        };

        products.unshift(newProd);
        saveAndSync();
        
        // Clear Form
        ['p-name', 'p-price', 'p-img', 'p-desc'].forEach(id => document.getElementById(id).value = '');
    }

    function deleteProduct(id) {
        if(confirm("Delete this product?")) {
            products = products.filter(p => p.id !== id);
            saveAndSync();
        }
    }

    function saveAndSync() {
        localStorage.setItem('fw_prods', JSON.stringify(products));
        document.getElementById('json-output').value = JSON.stringify(products, null, 4);
        renderAll();
    }

    // --- RENDER ENGINE ---
    function renderAll() {
        // Render Shop
        const shop = document.getElementById('product-list');
        if(products.length === 0) {
            shop.innerHTML = "<p style='text-align:center; grid-column: 1/-1;'>No products found. Use Admin Panel to add some.</p>";
        } else {
            shop.innerHTML = products.map(p => `
                <div class="prod-card">
                    <img src="${p.img}" style="width:100%; height:220px; object-fit:cover; margin-bottom:15px;">
                    <h3 style="font-family:'Playfair Display'; margin-bottom:8px;">${p.name}</h3>
                    <p style="font-size:0.85rem; color:#555; line-height:1.4; margin-bottom:15px; flex-grow:1;">${p.desc || ''}</p>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:auto;">
                        <span style="font-weight:bold; color:var(--leather); font-size:1.2rem;">$${p.price}</span>
                        <button onclick="buyNow(${p.id})" style="padding:8px 15px; background:var(--ink); color:white; border:none; cursor:pointer; font-weight:bold;">Buy Now</button>
                    </div>
                </div>
            `).join('');
        }

        // Render Checkout
        document.getElementById('checkout-items').innerHTML = cart.map(i => `<p>• ${i.name} <span style="float:right">$${i.price}</span></p>`).join('');
        document.getElementById('checkout-total').innerText = cart.reduce((a, b) => a + Number(b.price), 0).toFixed(2);

        // Render Admin Table
        const inv = document.querySelector('#admin-inventory tbody');
        inv.innerHTML = products.map(p => `
            <tr>
                <td style="font-weight:bold">${p.name}</td>
                <td>$${p.price}</td>
                <td><button onclick="deleteProduct(${p.id})" style="color:red; background:none; border:none; cursor:pointer; font-weight:bold;">Delete</button></td>
            </tr>
        `).join('');
    }

    // Initial Load
    navigateTo('shop');
    if(products.length > 0) document.getElementById('json-output').value = JSON.stringify(products, null, 4);
</script>

</body>
</html>
