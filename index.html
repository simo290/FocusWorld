<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus.World | Affiliate Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Playfair+Display:ital,wght@0,400;1,700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --paper: #FDFBF7; --ink: #2C241B; --gold: #C5A059; --leather: #8B5E3C; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--paper); color: var(--ink); font-family: 'Lato', sans-serif; }
        header { background: white; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--leather); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Cinzel', serif; font-size: 1.6rem; cursor: pointer; user-select: none; -webkit-user-select: none; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 20px; }
        .view { display: none; }
        .active-view { display: block !important; }

        /* Admin Styles */
        #view-admin { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 2px dashed var(--leather); padding: 30px; border-radius: 20px; margin-top: 20px; }
        .prod-card { background: white; padding: 15px; border: 1px solid #ddd; display: flex; flex-direction: column; transition: 0.3s; }
        .btn-buy { width: 100%; padding: 12px; background: var(--ink); color: white; border: none; cursor: pointer; font-weight: bold; text-decoration: none; text-align: center; display: block; margin-top: 10px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        #json-output { background: #1a1a1a; color: #00ff00; padding: 15px; width: 100%; height: 150px; font-family: monospace; }
    </style>
</head>
<body>

<header>
    <div class="logo" id="admin-trigger">Focus.World</div>
</header>

<div class="container">
    <section id="view-shop" class="view active-view">
        <h1 style="text-align:center; font-family:'Playfair Display'; margin-bottom:2rem;">Reading Solutions Collection</h1>
        <div id="product-list" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:2rem;"></div>
    </section>

    <section id="view-admin" class="view">
        <h1 style="font-family:'Cinzel'">Admin Panel (Secret)</h1>
        <div style="display:grid; grid-template-columns: 350px 1fr; gap:2rem; margin-top:2rem;">
            <aside>
                <div style="background:white; padding:20px; border:1px solid #ddd;">
                    <h3>Add Product</h3>
                    <input type="text" id="p-name" placeholder="Product Name">
                    <input type="number" id="p-price" placeholder="Price ($)">
                    <input type="text" id="p-img" placeholder="Image URL">
                    <input type="text" id="p-link" placeholder="Affiliate Link">
                    <textarea id="p-desc" placeholder="Description" rows="3"></textarea>
                    <button class="btn-buy" onclick="admin_addProduct()">Generate JSON</button>
                    <button class="btn-buy" onclick="window.location.reload()" style="background:#666;">Exit Admin</button>
                </div>
            </aside>
            <main>
                <textarea id="json-output" readonly placeholder="JSON Output..."></textarea>
                <div id="admin-list" style="margin-top:20px"></div>
            </main>
        </div>
    </section>
</div>

<script>
    let products = JSON.parse(localStorage.getItem('fw_prods')) || [];
    let clickCount = 0;
    let clickTimer;
    const ADMIN_PASS = "canon_-!LB2107"; 

    // إصلاح مشكل الكليكات
    document.getElementById('admin-trigger').addEventListener('click', function() {
        clickCount++;
        clearTimeout(clickTimer);
        
        clickTimer = setTimeout(() => { clickCount = 0; }, 500); // عندك نص ثانية بين كليكة وكليكة

        if (clickCount === 3) {
            let pass = prompt("Enter Password:");
            if (pass === ADMIN_PASS) {
                document.getElementById('view-shop').classList.remove('active-view');
                document.getElementById('view-admin').classList.add('active-view');
                renderAdmin();
            }
            clickCount = 0;
        }
    });

    function admin_addProduct() {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        const img = document.getElementById('p-img').value;
        const link = document.getElementById('p-link').value;
        const desc = document.getElementById('p-desc').value;

        if(!name || !link) return alert("Required fields missing!");

        products.unshift({ id: Date.now(), name, price, img, link, desc });
        save();
        alert("Product added to JSON!");
    }

    function deleteProduct(id) {
        products = products.filter(p => p.id !== id);
        save();
    }

    function save() {
        localStorage.setItem('fw_prods', JSON.stringify(products));
        document.getElementById('json-output').value = JSON.stringify(products, null, 4);
        renderShop();
        renderAdmin();
    }

    function renderShop() {
        const list = document.getElementById('product-list');
        list.innerHTML = products.length ? products.map(p => `
            <div class="prod-card">
                <img src="${p.img || 'https://via.placeholder.com/300'}" style="width:100%; height:200px; object-fit:cover">
                <h3 style="margin:10px 0;">${p.name}</h3>
                <p style="font-size:0.8rem; color:#666; flex-grow:1">${p.desc || ''}</p>
                <p style="font-weight:bold; color:var(--leather);">$${p.price}</p>
                <a href="${p.link}" target="_blank" class="btn-buy">Buy Now</a>
            </div>
        `).join('') : "<p style='grid-column:1/-1; text-align:center;'>No products yet. Enter Admin to add.</p>";
    }

    function renderAdmin() {
        const list = document.getElementById('admin-list');
        list.innerHTML = "<h4>Current Inventory:</h4>" + products.map(p => `
            <div style="background:#fff; padding:10px; border-bottom:1px solid #ddd; display:flex; justify-content:space-between;">
                <span>${p.name}</span>
                <button onclick="deleteProduct(${p.id})" style="color:red; border:none; background:none; cursor:pointer;">Delete</button>
            </div>
        `).join('');
    }

    renderShop();
</script>
</body>
</html>
