<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus.World | Reading Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Playfair+Display:ital,wght@0,400;1,700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0f0f0f; --card-bg: #1a1a1a; --text: #e0e0e0; 
            --gold: #C5A059; --gold-dim: #8c703d;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Lato', sans-serif; overflow-x: hidden; }
        
        header { 
            background: rgba(0,0,0,0.95); padding: 1.2rem 5%; 
            display: flex; justify-content: center; 
            border-bottom: 1px solid var(--gold-dim); 
            position: fixed; top: 0; width: 100%; z-index: 1000;
            transition: transform 0.4s ease-in-out; 
        }
        header.hide { transform: translateY(-100%); }

        .logo { 
            font-family: 'Cinzel', serif; font-size: 1.8rem; 
            color: var(--gold); letter-spacing: 4px; cursor: pointer; user-select: none;
        }

        .container { max-width: 1200px; margin: 8rem auto 3rem auto; padding: 0 20px; }
        
        .search-container { 
            text-align: center; margin-bottom: 3rem; position: relative; max-width: 500px; margin-left: auto; margin-right: auto;
        }
        
        /* iOS Zoom Fix & Font Size Update */
        #search-input {
            width: 100%; padding: 12px 20px; background: transparent; 
            border: 1px solid var(--gold-dim); color: #fff; font-family: 'Lato';
            border-radius: 25px; outline: none; transition: 0.3s;
            font-size: 16px; 
        }
        #search-input:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(197, 160, 89, 0.2); }

        .view { display: none; }
        .active-view { display: block; animation: fadeIn 0.8s ease-in; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 2rem; 
            align-items: start;
        }
        
        /* Product Card Base */
        .prod-card { 
            background: var(--card-bg); 
            border: 1px solid #333; 
            padding: 20px; 
            border-radius: 15px; 
            display: flex; 
            flex-direction: column;
            overflow: hidden;
            position: relative;
            transition: border-color 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease, max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Amazon Image Correction */
        .prod-img { 
            width: 100%; 
            height: 230px; 
            object-fit: contain; 
            background: #ffffff; 
            border-radius: 10px;
            margin-bottom: 15px; 
            padding: 10px;
            flex-shrink: 0;
        }
        
        .prod-title { font-family: 'Playfair Display'; color: var(--gold); margin-bottom: 12px; font-size: 1.4rem; }
        
        .prod-desc { 
            font-size: 0.95rem; 
            color: #ccc; 
            line-height: 1.6;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .amazon-note { 
            font-size: 0.8rem; 
            color: var(--gold-dim); 
            margin-bottom: 15px; 
            font-style: italic;
            margin-top: auto;
        }

        /* Base Button (Mobile Optimized by default, tweaked in desktop) */
        .btn-buy { 
            display: block; 
            padding: 14px; 
            border: 1px solid var(--gold);
            color: var(--gold); 
            text-decoration: none; 
            text-align: center; 
            font-family: 'Cinzel'; 
            font-size: 1rem; 
            border-radius: 8px;
            transition: 0.3s;
            flex-shrink: 0;
        }
        .btn-buy:hover { background: var(--gold); color: #000; }

        /* Desktop Hover Logic (min-width: 769px) */
        @media (min-width: 769px) {
            .prod-card { max-height: 480px; }
            
            .prod-card:hover { 
                border-color: var(--gold); 
                transform: translateY(-10px); 
                box-shadow: 0 15px 40px rgba(0,0,0,0.8);
                max-height: 1200px; 
            }

            .prod-desc {
                display: -webkit-box;
                -webkit-line-clamp: 2; 
                -webkit-box-orient: vertical;  
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .prod-card:hover .prod-desc {
                -webkit-line-clamp: unset; 
                display: block;
                overflow: visible;
            }

            .btn-buy { padding: 12px; font-size: 0.8rem; }
        }

        /* Mobile Optimization (max-width: 768px) */
        @media (max-width: 768px) {
            .container { margin-top: 6rem; }
            
            .grid { 
                grid-template-columns: 1fr; /* Full width cards */
            }

            .prod-card { 
                max-height: none; /* Disable hover expansion constraint */
            } 

            .prod-desc { 
                display: block; 
                -webkit-line-clamp: unset; 
                overflow: visible; 
            }

            .logo { font-size: 1.5rem; }
        }

        /* Admin Styles */
        #view-admin { background: rgba(20,20,20,0.98); padding: 30px; border: 1px solid var(--gold); border-radius: 15px; }
        input, textarea { width: 100%; padding: 10px; margin: 8px 0; background: #000; border: 1px solid #444; color: #fff; border-radius: 5px; }
        #json-output { background: #000; color: #0f0; width: 100%; height: 150px; font-family: monospace; border-radius: 5px; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<header id="main-header">
    <div class="logo" id="admin-trigger">FOCUS.WORLD</div>
</header>

<div class="container">
    <section id="view-shop" class="view active-view">
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search for your next reading tool..." onkeyup="filterProducts()">
        </div>
        <div id="product-list" class="grid"></div>
    </section>

    <section id="view-admin" class="view">
        <h2 style="color:var(--gold); margin-bottom:20px;">Admin Inventory (JSON)</h2>
        <div style="display:grid; grid-template-columns: 1fr 1.5fr; gap:20px;">
            <div style="background:#111; padding:15px; border-radius: 10px;">
                <input type="text" id="p-name" placeholder="Product Name">
                <input type="text" id="p-img" placeholder="Image URL">
                <input type="text" id="p-link" placeholder="Amazon Affiliate Link">
                <textarea id="p-desc" placeholder="Product Description" rows="4"></textarea>
                <button class="btn-buy" style="width:100%" onclick="admin_addProduct()">Generate JSON</button>
                <button class="btn-buy" style="width:100%; border-color:#555; color:#555; margin-top:10px;" onclick="window.location.reload()">Exit Admin</button>
            </div>
            <div>
                <textarea id="json-output" readonly placeholder="Copy this JSON to your affiliate.json file..."></textarea>
                <div id="admin-list" style="margin-top:20px"></div>
            </div>
        </div>
    </section>
</div>

<script>
    // JS Logic remains unchanged as requested updates were CSS/Structure focused
    let allProducts = [];
    const ADMIN_PASS = "canon_-!LB2107";
    let clicks = 0;

    let lastScroll = 0;
    const header = document.getElementById("main-header");
    window.addEventListener("scroll", () => {
        const currentScroll = window.pageYOffset;
        if (currentScroll <= 0) { header.classList.remove("hide"); return; }
        if (currentScroll > lastScroll && !header.classList.contains("hide")) {
            header.classList.add("hide");
        } else if (currentScroll < lastScroll && header.classList.contains("hide")) {
            header.classList.remove("hide");
        }
        lastScroll = currentScroll;
    });

    async function loadData() {
        try {
            const res = await fetch('affiliate.json');
            if(res.ok) {
                allProducts = await res.json();
                renderShop(allProducts);
            }
        } catch(e) { console.log("JSON Load Error"); }
    }

    function renderShop(data) {
        const list = document.getElementById('product-list');
        list.innerHTML = data.map(p => `
            <div class="prod-card">
                <img src="${p.img}" class="prod-img">
                <h3 class="prod-title">${p.name}</h3>
                <p class="prod-desc">${p.desc}</p>
                <p class="amazon-note">Check price on our Amazon store</p>
                <a href="${p.link}" target="_blank" class="btn-buy">VIEW ON AMAZON</a>
            </div>
        `).join('');
    }

    function filterProducts() {
        const term = document.getElementById('search-input').value.toLowerCase();
        const filtered = allProducts.filter(p => 
            p.name.toLowerCase().includes(term) || 
            p.desc.toLowerCase().includes(term)
        );
        renderShop(filtered);
    }

    document.getElementById('admin-trigger').addEventListener('click', () => {
        clicks++;
        setTimeout(() => clicks = 0, 1000);
        if(clicks === 3) {
            if(prompt("Admin Pass:") === ADMIN_PASS) {
                document.getElementById('view-shop').style.display = 'none';
                document.getElementById('view-admin').classList.add('active-view');
                renderAdmin();
            }
        }
    });

    function admin_addProduct() {
        const p = {
            id: Date.now(),
            name: document.getElementById('p-name').value,
            img: document.getElementById('p-img').value,
            link: document.getElementById('p-link').value,
            desc: document.getElementById('p-desc').value
        };
        if(!p.name || !p.link) return alert("Please fill Name and Link");
        allProducts.unshift(p);
        document.getElementById('json-output').value = JSON.stringify(allProducts, null, 4);
        renderAdmin();
    }

    function renderAdmin() {
        document.getElementById('admin-list').innerHTML = allProducts.map(p => `
            <div style="display:flex; justify-content:space-between; padding:12px; border-bottom:1px solid #333; align-items:center; color:white;">
                <span>${p.name}</span>
                <button onclick="deleteProd(${p.id})" style="color:#ff4444; background:none; border:none; cursor:pointer; font-weight:bold;">DELETE</button>
            </div>
        `).join('');
    }

    function deleteProd(id) {
        allProducts = allProducts.filter(x => x.id !== id);
        document.getElementById('json-output').value = JSON.stringify(allProducts, null, 4);
        renderAdmin();
    }

    loadData();
</script>
</body>
</html>
